# Runs when a GitHub remote is configured. GitLab: see .gitlab-ci.yml (master gate).
name: CI

on:
  push:
    branches: [dev, main, master]
  pull_request:
    branches: [dev, main, master]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
      - run: npm run install:all
      - run: npm run check
      - run: npm test
      - run: npm run build
